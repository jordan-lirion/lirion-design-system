<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mot de passe — Lirion</title>
  <link rel="stylesheet" href="components/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-muted">

  <header class="header">
    <div class="header__start">
      <img src="assets/logo.svg" alt="Lirion" class="header__logo" />
    </div>
  </header>

  <main class="page-centered">

    <div class="auth-stack">

      <a href="index.html" class="btn btn--secondary btn--sm">
        <i data-lucide="arrow-left"></i>
        Retour
      </a>

      <div class="card auth-card">

        <div class="card__header">
          <h1 class="card__title">Entrez votre mot de passe</h1>
          <p class="card__description">Connectez-vous avec votre mot de passe Lirion.</p>
        </div>

        <div class="card__content">

          <div class="field">
            <div class="input-group input-group--icon-end">
              <input class="input" type="password" id="ig-password" placeholder="Enter password">
              <button type="button" class="input-group__icon input-group__icon--end input-group__icon--btn" data-password-toggle aria-label="Toggle password visibility">
                <i id="icon-eye-off" data-lucide="eye-off"></i>
                <i id="icon-eye" data-lucide="eye" class="is-hidden"></i>
              </button>
            </div>
          </div>

          <button class="btn btn--default btn--full" onclick="location.href='dashboard.html'">Connexion</button>

          <p class="auth-footer">
            <button class="btn btn--link" value="Mot de passe oublié ?" onclick="location.href='forgotPassword.html'">Mot de passe oublié ?</button>
          </p>

        </div>

      </div>

    </div>

  </main>

  <script src="components/form/form.js" defer></script>
  <script>lucide.createIcons();</script>

</body>
</html>
