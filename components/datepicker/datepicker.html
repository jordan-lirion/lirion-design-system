<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datepicker — design-system</title>
  <link rel="stylesheet" href="../main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Datepicker</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Default</h2>
      <div data-datepicker style="width:16rem;">
        <button class="btn btn--outline btn--full datepicker__trigger" type="button" data-datepicker-trigger>
          <i data-lucide="calendar"></i>
          <span class="datepicker__value">Sélectionner une date</span>
        </button>
      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">In a form</h2>
      <div class="field" style="width:16rem;">
        <label class="label">Date de naissance</label>
        <div data-datepicker>
          <button class="btn btn--outline btn--full datepicker__trigger" type="button" data-datepicker-trigger>
            <i data-lucide="calendar"></i>
            <span class="datepicker__value">Sélectionner une date</span>
          </button>
        </div>
      </div>
    </section>

  </main>

  <script src="../datepicker/datepicker.js" defer></script>
  <script>lucide.createIcons();</script>

</body>
</html>
