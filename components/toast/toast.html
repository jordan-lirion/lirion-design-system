<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toast — design-system</title>
  <link rel="stylesheet" href="../main.css" />
  <link rel="stylesheet" href="../button/button.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Toast</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Variants</h2>
      <div class="stack">

        <div class="toast toast--default">
          <i data-lucide="bell" class="toast__icon"></i>
          <p class="toast__text">Événement créé le mardi 14 janvier à 9h00.</p>
          <button class="toast__close" aria-label="Close"><i data-lucide="x"></i></button>
        </div>

        <div class="toast toast--success">
          <i data-lucide="circle-check" class="toast__icon"></i>
          <p class="toast__text">Modifications enregistrées avec succès.</p>
          <button class="toast__close" aria-label="Close"><i data-lucide="x"></i></button>
        </div>

        <div class="toast toast--warning">
          <i data-lucide="triangle-alert" class="toast__icon"></i>
          <p class="toast__text">Espace de stockage presque plein (90% utilisé).</p>
          <button class="toast__close" aria-label="Close"><i data-lucide="x"></i></button>
        </div>

        <div class="toast toast--error">
          <i data-lucide="circle-x" class="toast__icon"></i>
          <p class="toast__text">Échec de l'envoi. Veuillez réessayer.</p>
          <button class="toast__close" aria-label="Close"><i data-lucide="x"></i></button>
        </div>

        <div class="toast toast--info">
          <i data-lucide="info" class="toast__icon"></i>
          <p class="toast__text">Nouvelle mise à jour disponible — version 2.5.0.</p>
          <button class="toast__close" aria-label="Close"><i data-lucide="x"></i></button>
        </div>

      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Interactive — auto-dismiss after 4 s</h2>
      <div class="row">
        <button class="btn btn--outline btn--sm" onclick="showToast('default', 'Événement créé le mardi 14 janvier à 9h00.')">Default</button>
        <button class="btn btn--outline btn--sm" onclick="showToast('success', 'Modifications enregistrées avec succès.')">Success</button>
        <button class="btn btn--outline btn--sm" onclick="showToast('warning', 'Espace de stockage presque plein (90% utilisé).')">Warning</button>
        <button class="btn btn--outline btn--sm" onclick="showToast('error', 'Échec de l\'envoi. Veuillez réessayer.')">Error</button>
        <button class="btn btn--outline btn--sm" onclick="showToast('info', 'Nouvelle mise à jour disponible — version 2.5.0.')">Info</button>
      </div>
    </section>

  </main>

  <div class="toaster" id="toaster" aria-live="polite" aria-atomic="false"></div>

  <script src="../toast/toast.js" defer></script>
  <script>lucide.createIcons();</script>

</body>
</html>
