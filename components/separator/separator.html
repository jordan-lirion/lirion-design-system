<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Separator — design-system</title>
  <link rel="stylesheet" href="../main.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Separator</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section">
      <h2 class="preview-section__title">Horizontal</h2>
      <div class="stack">
        <p style="color:var(--muted-foreground);">Content above the separator.</p>
        <hr class="separator" />
        <p style="color:var(--muted-foreground);">Content below the separator.</p>
        <hr class="separator" />
        <p style="color:var(--muted-foreground);">A third block of content.</p>
      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Vertical</h2>
      <div class="row">
        <span style="color:var(--muted-foreground);">Profile</span>
        <hr class="separator separator--vertical" />
        <span style="color:var(--muted-foreground);">Settings</span>
        <hr class="separator separator--vertical" />
        <span style="color:var(--muted-foreground);">Help</span>
      </div>
    </section>

  </main>

</body>
</html>
