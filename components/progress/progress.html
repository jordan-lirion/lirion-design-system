<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress — design-system</title>
  <link rel="stylesheet" href="../main.css" />
  <link rel="stylesheet" href="../form/form.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Progress</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Progress levels</h2>
      <div class="stack">
        <div class="field">
          <label class="label">0%</label>
          <div class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            <div class="progress__bar" style="width:0%;"></div>
          </div>
        </div>
        <div class="field">
          <label class="label">25%</label>
          <div class="progress" role="progressbar" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
            <div class="progress__bar" style="width:25%;"></div>
          </div>
        </div>
        <div class="field">
          <label class="label">50%</label>
          <div class="progress" role="progressbar" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
            <div class="progress__bar" style="width:50%;"></div>
          </div>
        </div>
        <div class="field">
          <label class="label">75%</label>
          <div class="progress" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
            <div class="progress__bar" style="width:75%;"></div>
          </div>
        </div>
        <div class="field">
          <label class="label">100%</label>
          <div class="progress" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
            <div class="progress__bar" style="width:100%;"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Labeled examples</h2>
      <div class="stack">
        <div class="field">
          <label class="label">Download — 66%</label>
          <div class="progress" role="progressbar" aria-valuenow="66" aria-valuemin="0" aria-valuemax="100">
            <div class="progress__bar" style="width:66%;"></div>
          </div>
        </div>
        <div class="field">
          <label class="label">Profile completion — 40%</label>
          <div class="progress" role="progressbar" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100">
            <div class="progress__bar" style="width:40%;"></div>
          </div>
        </div>
        <div class="field">
          <label class="label">Storage used — 88%</label>
          <div class="progress" role="progressbar" aria-valuenow="88" aria-valuemin="0" aria-valuemax="100">
            <div class="progress__bar" style="width:88%;"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
