<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton — design-system</title>
  <link rel="stylesheet" href="../main.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Skeleton</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">User profile</h2>
      <div class="row">
        <div class="skeleton" style="width:2.5rem;height:2.5rem;border-radius:50%;flex-shrink:0;"></div>
        <div class="stack" style="flex:1;gap:0.5rem;">
          <div class="skeleton" style="height:0.875rem;width:55%;"></div>
          <div class="skeleton" style="height:0.875rem;width:35%;"></div>
        </div>
      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Text block</h2>
      <div class="stack" style="gap:0.5rem;">
        <div class="skeleton" style="height:1rem;width:80%;"></div>
        <div class="skeleton" style="height:1rem;width:100%;"></div>
        <div class="skeleton" style="height:1rem;width:65%;"></div>
      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Image / media</h2>
      <div class="skeleton" style="height:9rem;"></div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Loading card</h2>
      <div class="stack" style="gap:1rem;">
        <div class="skeleton" style="height:6rem;"></div>
        <div class="stack" style="gap:0.5rem;">
          <div class="skeleton" style="height:1rem;width:60%;"></div>
          <div class="skeleton" style="height:0.875rem;width:40%;"></div>
        </div>
        <div class="skeleton" style="height:2.25rem;width:8rem;"></div>
      </div>
    </section>

  </main>

</body>
</html>
