<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar — design-system</title>
  <link rel="stylesheet" href="../main.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Avatar</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Sizes</h2>
      <div class="row">
        <span class="avatar">JD</span>
        <span class="avatar avatar--sm">ML</span>
      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Group</h2>
      <div class="row">
        <div class="avatar-group">
          <span class="avatar">AB</span>
          <span class="avatar">CD</span>
          <span class="avatar">EF</span>
          <span class="avatar">+5</span>
        </div>
        <div class="avatar-group">
          <span class="avatar avatar--sm">AB</span>
          <span class="avatar avatar--sm">CD</span>
          <span class="avatar avatar--sm">+3</span>
        </div>
      </div>
    </section>

    <section class="preview-section">
      <h2 class="preview-section__title">Examples</h2>
      <div class="row">
        <span class="avatar" style="background:var(--chart-1);color:#fff;">JG</span>
        <span class="avatar" style="background:var(--chart-2);color:#fff;">MA</span>
        <span class="avatar" style="background:var(--chart-4);color:#fff;">PB</span>
        <span class="avatar avatar--sm" style="background:var(--chart-5);color:#fff;">LC</span>
      </div>
    </section>

  </main>

</body>
</html>
