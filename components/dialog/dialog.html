<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dialog — design-system</title>
  <link rel="stylesheet" href="../main.css" />
  <link rel="stylesheet" href="../button/button.css" />
  <link rel="stylesheet" href="../form/form.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Dialog</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Destructive confirmation</h2>
      <div class="row">
        <button class="btn btn--outline" id="open-confirm">Delete project</button>
      </div>
      <dialog class="dialog" id="dialog-confirm">
        <div class="dialog__header">
          <h3 class="dialog__title">Delete project?</h3>
          <p class="dialog__description">This action is permanent. The project and all its data will be deleted.</p>
        </div>
        <div class="dialog__footer">
          <button class="btn btn--outline" data-close>Cancel</button>
          <button class="btn btn--destructive" data-close>Delete</button>
        </div>
      </dialog>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Form in a dialog</h2>
      <div class="row">
        <button class="btn btn--default" id="open-form">Invite a member</button>
      </div>
      <dialog class="dialog" id="dialog-form">
        <div class="dialog__header">
          <h3 class="dialog__title">Invite a member</h3>
          <p class="dialog__description">Enter the email address of the person to invite.</p>
        </div>
        <div class="field">
          <label class="label" for="invite-email">Email address</label>
          <input class="input" type="email" id="invite-email" placeholder="name@example.com" />
        </div>
        <div class="dialog__footer">
          <button class="btn btn--outline" data-close>Cancel</button>
          <button class="btn btn--default" data-close>Send invitation</button>
        </div>
      </dialog>
    </section>

  </main>

  <script>
    function initDialog(triggerId, dialogId) {
      const trigger = document.getElementById(triggerId);
      const dialog = document.getElementById(dialogId);
      trigger.addEventListener("click", () => dialog.showModal());
      dialog.querySelectorAll("[data-close]").forEach((btn) =>
        btn.addEventListener("click", () => dialog.close())
      );
      dialog.addEventListener("click", (e) => {
        if (e.target === dialog) dialog.close();
      });
    }
    initDialog("open-confirm", "dialog-confirm");
    initDialog("open-form", "dialog-form");
  </script>

</body>
</html>
