<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tooltip — design-system</title>
  <link rel="stylesheet" href="../main.css" />
  <link rel="stylesheet" href="../button/button.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Tooltip</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section">
      <h2 class="preview-section__title">On buttons</h2>
      <div class="row">
        <button class="btn btn--outline btn--icon" data-tooltip="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8 7 17M17 7l2.8-2.8"/></svg>
        </button>
        <button class="btn btn--outline btn--icon" data-tooltip="Notifications" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <button class="btn btn--outline btn--icon" data-tooltip="Delete" aria-label="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
        <button class="btn btn--default" data-tooltip="Saves your progress">Save</button>
      </div>
    </section>

    <section class="preview-section">
      <h2 class="preview-section__title">Tooltip icon</h2>
      <div class="row">
        <span class="tooltip-icon" data-tooltip="Additional information">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </span>
        <span class="tooltip-icon tooltip-icon--destructive" data-tooltip="This action is irreversible">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </span>
        <span class="tooltip-icon tooltip-icon--success" data-tooltip="Verified and active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </span>
        <span class="tooltip-icon tooltip-icon--warning" data-tooltip="Requires your attention">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </span>
      </div>
    </section>

    <section class="preview-section">
      <h2 class="preview-section__title">On text</h2>
      <p style="color:var(--muted-foreground);">
        Hover over this
        <span data-tooltip="Term defined in the glossary" style="text-decoration:underline;text-underline-offset:3px;cursor:default;">technical term</span>
        to see its definition.
        Or this
        <span data-tooltip="Shared workspace for multiple users" style="text-decoration:underline;text-underline-offset:3px;cursor:default;">workspace</span>
        to learn more.
      </p>
    </section>

  </main>

</body>
</html>
