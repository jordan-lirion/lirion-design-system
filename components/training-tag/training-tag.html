<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Tag — design-system</title>
  <link rel="stylesheet" href="../main.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Training Tag</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section">
      <h2 class="preview-section__title">Training tags — all variants</h2>
      <div class="row" style="flex-wrap:wrap;">
        <span class="training-tag training-tag--larma">Larma</span>
        <span class="training-tag training-tag--graphogame">Graphogame</span>
        <span class="training-tag training-tag--memoson">Memoson</span>
        <span class="training-tag training-tag--fus-seg">FusSeg</span>
        <span class="training-tag training-tag--phonemix">Phonemix</span>
        <span class="training-tag training-tag--ran">RAN</span>
        <span class="training-tag training-tag--loh">LOH</span>
        <span class="training-tag training-tag--maeva">Maeva</span>
        <span class="training-tag training-tag--switchipido">Switchipido</span>
        <span class="training-tag training-tag--elor">Elor</span>
        <span class="training-tag training-tag--rech-visuelle">Rech. Visuelle</span>
      </div>
    </section>

    <section class="preview-section">
      <h2 class="preview-section__title">Training icons — all variants</h2>
      <div class="row" style="flex-wrap:wrap;">
        <img class="training-icon" src="../assets/trainings/larma.svg" alt="Larma">
        <img class="training-icon" src="../assets/trainings/graphogame.svg" alt="Graphogame">
        <img class="training-icon" src="../assets/trainings/memoson.svg" alt="Memoson">
        <img class="training-icon" src="../assets/trainings/fus-seg.svg" alt="FusSeg">
        <img class="training-icon" src="../assets/trainings/phonemix.svg" alt="Phonemix">
        <img class="training-icon" src="../assets/trainings/ran.svg" alt="RAN">
        <img class="training-icon" src="../assets/trainings/loh.svg" alt="LOH">
        <img class="training-icon" src="../assets/trainings/maeva.svg" alt="Maeva">
        <img class="training-icon" src="../assets/trainings/switchipido.svg" alt="Switchipido">
        <img class="training-icon" src="../assets/trainings/elor.svg" alt="Elor">
        <img class="training-icon" src="../assets/trainings/rech-visuelle.svg" alt="Rech. Visuelle">
      </div>
    </section>

    <section class="preview-section">
      <h2 class="preview-section__title">Chip checkbox</h2>
      <div class="row" style="flex-wrap:wrap;">
        <!-- Unchecked -->
        <button class="chip-checkbox" aria-pressed="false">
          <span class="chip-checkbox__box">
            <svg viewBox="0 0 11 11" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5 5.5 4.5 8.5 9.5 2.5"/>
            </svg>
          </span>
          Phonemix
        </button>

        <!-- Checked -->
        <button class="chip-checkbox" aria-pressed="true">
          <span class="chip-checkbox__box">
            <svg viewBox="0 0 11 11" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5 5.5 4.5 8.5 9.5 2.5"/>
            </svg>
          </span>
          Larma
        </button>

        <button class="chip-checkbox" aria-pressed="false">
          <span class="chip-checkbox__box">
            <svg viewBox="0 0 11 11" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5 5.5 4.5 8.5 9.5 2.5"/>
            </svg>
          </span>
          Graphogame
        </button>

        <button class="chip-checkbox" aria-pressed="true">
          <span class="chip-checkbox__box">
            <svg viewBox="0 0 11 11" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5 5.5 4.5 8.5 9.5 2.5"/>
            </svg>
          </span>
          Memoson
        </button>

        <button class="chip-checkbox" aria-pressed="false">
          <span class="chip-checkbox__box">
            <svg viewBox="0 0 11 11" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5 5.5 4.5 8.5 9.5 2.5"/>
            </svg>
          </span>
          RAN
        </button>
      </div>
    </section>

  </main>

  <script src="../chip-checkbox/chip-checkbox.js" defer></script>

</body>
</html>
