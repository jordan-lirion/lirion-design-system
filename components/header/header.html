<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Header — design-system</title>
  <link rel="stylesheet" href="../main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Form</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <header class="header">
        <div class="ds-brand">
          <span>Lirion</span>
          <span class="ds-brand__sep">/</span>
          <span class="ds-brand__sub">design-system</span>
        </div>
        <button class="btn btn--outline btn--sm" id="theme-toggle" aria-pressed="false">
          <i data-lucide="sun"></i>
          Dark mode
        </button>
      </header>
    </section>

  </main>
  <script>lucide.createIcons();</script>

</body>
</html>
