<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — design-system</title>
  <link rel="stylesheet" href="../main.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Calendar</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section">
      <h2 class="preview-section__title">Monthly grid</h2>
      <div class="calendar">
        <div class="calendar__head">
          <div class="calendar__day-name">Lu</div>
          <div class="calendar__day-name">Ma</div>
          <div class="calendar__day-name">Me</div>
          <div class="calendar__day-name">Je</div>
          <div class="calendar__day-name">Ve</div>
          <div class="calendar__day-name">Sa</div>
          <div class="calendar__day-name">Di</div>
        </div>
        <div class="calendar__body">
          <!-- Week 1 -->
          <div class="calendar__week">
            <div class="calendar__cell">
              <span class="calendar__date">2</span>
              <span class="badge badge--success">Séance 1</span>
              <span class="calendar__duration">45 min</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">3</span>
              <span class="badge badge--success">Séance 2</span>
              <span class="calendar__duration">30 min</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">4</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">5</span>
              <span class="badge badge--destructive">Partielle</span>
              <span class="calendar__duration">20 min</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">6</span>
              <span class="badge badge--success">Séance 3</span>
              <span class="calendar__duration">45 min</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">7</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">8</span>
            </div>
          </div>
          <!-- Week 2 -->
          <div class="calendar__week">
            <div class="calendar__cell">
              <span class="calendar__date">9</span>
              <span class="badge badge--success">Séance 4</span>
              <span class="calendar__duration">45 min</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">10</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">11</span>
              <span class="badge badge--success">Séance 5</span>
              <span class="calendar__duration">30 min</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">12</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">13</span>
              <span class="badge badge--destructive">Partielle</span>
              <span class="calendar__duration">15 min</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">14</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">15</span>
            </div>
          </div>
          <!-- Week 3 -->
          <div class="calendar__week">
            <div class="calendar__cell">
              <span class="calendar__date">16</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">17</span>
              <span class="badge badge--success">Séance 6</span>
              <span class="calendar__duration">45 min</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">18</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">19</span>
              <span class="badge badge--success">Séance 7</span>
              <span class="calendar__duration">30 min</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">20</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">21</span>
            </div>
            <div class="calendar__cell">
              <span class="calendar__date">22</span>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script>
    const themeToggle = document.createElement("button");
    themeToggle.className = "btn btn--outline btn--sm";
    themeToggle.style.cssText = "position:fixed;bottom:1.5rem;right:1.5rem;";
    themeToggle.textContent = "Dark mode";
    themeToggle.addEventListener("click", () => {
      const isDark = document.documentElement.classList.toggle("dark");
      themeToggle.textContent = isDark ? "Light mode" : "Dark mode";
    });
    document.body.appendChild(themeToggle);
  </script>

</body>
</html>
