<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Program — design-system</title>
  <link rel="stylesheet" href="../main.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">design-system <span>/ Program</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section">
      <h2 class="preview-section__title">Boards + modules</h2>
      <div class="boards">

        <!-- Board 1 -->
        <div class="board">
          <div class="board__header">
            <span class="board__title">Semaine 1</span>
            <div class="dropdown" data-dropdown>
              <button class="btn btn--ghost btn--icon btn--sm" data-dropdown-trigger aria-haspopup="menu" aria-expanded="false" aria-label="Options">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              </button>
              <div class="dropdown__menu dropdown__menu--end" role="menu">
                <button class="dropdown__item" role="menuitem">Renommer</button>
                <button class="dropdown__item" role="menuitem">Dupliquer</button>
                <hr class="dropdown__separator" />
                <button class="dropdown__item dropdown__item--destructive" role="menuitem">Supprimer</button>
              </div>
            </div>
          </div>

          <div class="board__content">
            <!-- Module 1 -->
            <div class="module">
              <div class="module__header">
                <div class="module__tags">
                  <span class="training-tag training-tag--phonemix">Phonemix</span>
                  <span class="training-tag training-tag--larma">Larma</span>
                </div>
                <div class="dropdown" data-dropdown>
                  <button class="btn btn--ghost btn--icon btn--sm" data-dropdown-trigger aria-haspopup="menu" aria-expanded="false" aria-label="Options module">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                  </button>
                  <div class="dropdown__menu dropdown__menu--end" role="menu">
                    <button class="dropdown__item" role="menuitem">Modifier</button>
                    <button class="dropdown__item" role="menuitem">Dupliquer</button>
                    <hr class="dropdown__separator" />
                    <button class="dropdown__item dropdown__item--destructive" role="menuitem">Supprimer</button>
                  </div>
                </div>
              </div>
              <hr class="separator" />
              <div class="module__meta">5 séances · 45 min chacune</div>
              <div class="module__dots">
                <div class="session-dot session-dot--success">1</div>
                <div class="session-dot session-dot--success">2</div>
                <div class="session-dot session-dot--partial">3</div>
                <div class="session-dot session-dot--pending"></div>
                <div class="session-dot session-dot--pending"></div>
              </div>
            </div>

            <!-- Module 2 -->
            <div class="module">
              <div class="module__header">
                <div class="module__tags">
                  <span class="training-tag training-tag--graphogame">Graphogame</span>
                </div>
                <div class="dropdown" data-dropdown>
                  <button class="btn btn--ghost btn--icon btn--sm" data-dropdown-trigger aria-haspopup="menu" aria-expanded="false" aria-label="Options module">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                  </button>
                  <div class="dropdown__menu dropdown__menu--end" role="menu">
                    <button class="dropdown__item" role="menuitem">Modifier</button>
                    <button class="dropdown__item" role="menuitem">Dupliquer</button>
                    <hr class="dropdown__separator" />
                    <button class="dropdown__item dropdown__item--destructive" role="menuitem">Supprimer</button>
                  </div>
                </div>
              </div>
              <hr class="separator" />
              <div class="module__meta">3 séances · 30 min chacune</div>
              <div class="module__dots">
                <div class="session-dot session-dot--success">1</div>
                <div class="session-dot session-dot--test">T</div>
                <div class="session-dot session-dot--pending"></div>
              </div>
            </div>
          </div>

          <div class="board__footer">
            <button class="btn btn--outline btn--sm" style="width:100%;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              Nouveau module
            </button>
          </div>
        </div>

        <!-- Board 2 -->
        <div class="board">
          <div class="board__header">
            <span class="board__title">Semaine 2</span>
            <div class="dropdown" data-dropdown>
              <button class="btn btn--ghost btn--icon btn--sm" data-dropdown-trigger aria-haspopup="menu" aria-expanded="false" aria-label="Options">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              </button>
              <div class="dropdown__menu dropdown__menu--end" role="menu">
                <button class="dropdown__item" role="menuitem">Renommer</button>
                <button class="dropdown__item" role="menuitem">Dupliquer</button>
                <hr class="dropdown__separator" />
                <button class="dropdown__item dropdown__item--destructive" role="menuitem">Supprimer</button>
              </div>
            </div>
          </div>

          <div class="board__content">
            <!-- Module 3 -->
            <div class="module">
              <div class="module__header">
                <div class="module__tags">
                  <span class="training-tag training-tag--memoson">Memoson</span>
                  <span class="training-tag training-tag--ran">RAN</span>
                </div>
                <div class="dropdown" data-dropdown>
                  <button class="btn btn--ghost btn--icon btn--sm" data-dropdown-trigger aria-haspopup="menu" aria-expanded="false" aria-label="Options module">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                  </button>
                  <div class="dropdown__menu dropdown__menu--end" role="menu">
                    <button class="dropdown__item" role="menuitem">Modifier</button>
                    <button class="dropdown__item" role="menuitem">Dupliquer</button>
                    <hr class="dropdown__separator" />
                    <button class="dropdown__item dropdown__item--destructive" role="menuitem">Supprimer</button>
                  </div>
                </div>
              </div>
              <hr class="separator" />
              <div class="module__meta">5 séances · 45 min chacune</div>
              <div class="module__dots">
                <div class="session-dot session-dot--pending"></div>
                <div class="session-dot session-dot--pending"></div>
                <div class="session-dot session-dot--pending"></div>
                <div class="session-dot session-dot--pending"></div>
                <div class="session-dot session-dot--pending"></div>
              </div>
            </div>
          </div>

          <div class="board__footer">
            <button class="btn btn--outline btn--sm" style="width:100%;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              Nouveau module
            </button>
          </div>
        </div>

      </div>
    </section>

    <section class="preview-section">
      <h2 class="preview-section__title">Session dot variants</h2>
      <div class="row">
        <div class="session-dot session-dot--success">1</div>
        <div class="session-dot session-dot--partial">2</div>
        <div class="session-dot session-dot--pending"></div>
        <div class="session-dot session-dot--test">T</div>
      </div>
    </section>

  </main>

  <script src="../dropdown/dropdown.js" defer></script>
  <script src="../program/program.js" defer></script>

</body>
</html>
