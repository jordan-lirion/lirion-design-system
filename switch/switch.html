<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Switch — Design System</title>
  <link rel="stylesheet" href="../theme.css" />
  <link rel="stylesheet" href="switch.css" />
  <link rel="stylesheet" href="../checkbox/checkbox.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">Design System <span>/ Switch</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">States</h2>
      <div class="stack">
        <label class="choice"><input type="checkbox" class="switch" checked /> On</label>
        <label class="choice"><input type="checkbox" class="switch" /> Off</label>
        <label class="choice"><input type="checkbox" class="switch" checked disabled /> On (disabled)</label>
        <label class="choice"><input type="checkbox" class="switch" disabled /> Off (disabled)</label>
      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Examples</h2>
      <div class="stack">
        <label class="choice"><input type="checkbox" class="switch" checked /> Airplane mode</label>
        <label class="choice"><input type="checkbox" class="switch" /> Auto-sync</label>
        <label class="choice"><input type="checkbox" class="switch" checked /> Push notifications</label>
        <label class="choice"><input type="checkbox" class="switch" /> Location</label>
      </div>
    </section>

  </main>

</body>
</html>
