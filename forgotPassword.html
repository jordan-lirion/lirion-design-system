<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="components/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-muted">

  <header class="header">
    <div class="header__start">
      <img src="assets/logo.svg" alt="Lirion" class="header__logo" />
    </div>
  </header>

  <main class="page-centered">

    <div class="auth-stack">

      <a href="password.html" class="btn btn--ghost btn--sm">
        <i data-lucide="arrow-left"></i>
        Retour
      </a>

      <div class="card auth-card">

        <div class="card__header">
          <h1 class="card__title">Mot de passe oublié ?</h1>
          <p class="card__description">Entrez votre adresse email pour réinitialiser votre mot de passe.</p>
        </div>

        <div class="card__content">

          <div class="field">
            <input class="input" type="email" id="email" placeholder="m@example.com" />
          </div>

          <button class="btn btn--default btn--full" onclick="showToast('success', 'Un email de réinitialisation a été envoyé à votre adresse email.')">Réinitialiser</button>

        </div>

      </div>

    </div>

  </main>

  <div class="toaster" id="toaster" aria-live="polite" aria-atomic="false"></div>

  <script src="components/toast/toast.js" defer></script>
  <script>lucide.createIcons();</script>

</body>
</html>
