<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Première connexion — Lirion</title>
  <link rel="stylesheet" href="components/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-muted">

  <header class="header">
    <div class="header__start">
      <img src="assets/logo.svg" alt="Lirion" class="header__logo" />
    </div>
  </header>

  <main class="page-centered">

    <div class="card auth-card">

      <div class="card__header">
        <h1 class="card__title">Bienvenue sur My Lirion</h1>
        <p class="card__description">Créez votre mot de passe associé à votre adresse email karine@lirion.app.</p>
      </div>

      <div class="card__content">

        <div class="field">
          <label class="label" for="ig-password-1">Créer un mot de passe</label>
          <div class="input-group input-group--icon-end">
            <input class="input" type="password" id="ig-password-1" placeholder="Enter password">
            <button type="button" class="input-group__icon input-group__icon--end input-group__icon--btn" data-password-toggle aria-label="Toggle password visibility">
              <i id="icon-eye-off-1" data-lucide="eye-off"></i>
              <i id="icon-eye-1" data-lucide="eye" class="is-hidden"></i>
            </button>
          </div>
          <p class="hint">Le mot de passe doit contenir au moins un chiffre, un caractère spécial et une majuscule.</p>
        </div>

        <div class="field">
          <label class="label" for="ig-password-2">Confirmer le mot de passe</label>
          <div class="input-group input-group--icon-end">
            <input class="input" type="password" id="ig-password-2" placeholder="Enter password">
            <button type="button" class="input-group__icon input-group__icon--end input-group__icon--btn" data-password-toggle aria-label="Toggle password visibility">
              <i id="icon-eye-off-2" data-lucide="eye-off"></i>
              <i id="icon-eye-2" data-lucide="eye" class="is-hidden"></i>
            </button>
          </div>
          <p class="hint">Les mots de passes doivent être identiques.</p>
        </div>

        <button class="btn btn--default btn--full" onclick="location.href='dashboard.html'">Créer un mot de passe</button>

      </div>

    </div>

  </main>

  <script src="components/form/form.js" defer></script>
  <script>lucide.createIcons();</script>

</body>
</html>
