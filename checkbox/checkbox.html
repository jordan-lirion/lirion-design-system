<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkbox & Radio — Design System</title>
  <link rel="stylesheet" href="../theme.css" />
  <link rel="stylesheet" href="checkbox.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">Design System <span>/ Checkbox &amp; Radio</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Checkbox</h2>
      <div class="stack">
        <label class="choice"><input type="checkbox" class="checkbox" checked /> Checked by default</label>
        <label class="choice"><input type="checkbox" class="checkbox" /> Unchecked</label>
        <label class="choice"><input type="checkbox" class="checkbox" disabled /> Disabled</label>
        <label class="choice"><input type="checkbox" class="checkbox" checked disabled /> Checked disabled</label>
      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Radio</h2>
      <div class="stack" role="radiogroup" aria-label="Plan">
        <label class="choice"><input type="radio" name="plan" class="radio" checked /> Free plan</label>
        <label class="choice"><input type="radio" name="plan" class="radio" /> Pro plan</label>
        <label class="choice"><input type="radio" name="plan" class="radio" /> Enterprise plan</label>
        <label class="choice"><input type="radio" name="plan-disabled" class="radio" disabled /> Disabled</label>
      </div>
    </section>

    <section class="preview-section">
      <h2 class="preview-section__title">Form examples</h2>
      <div class="stack">
        <label class="choice"><input type="checkbox" class="checkbox" checked /> Email notifications</label>
        <label class="choice"><input type="checkbox" class="checkbox" /> Weekly newsletter</label>
        <label class="choice"><input type="checkbox" class="checkbox" /> Security alerts</label>
      </div>
    </section>

  </main>

</body>
</html>
