<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="../components/main.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="bg-muted">

  <main class="page-centered">

    <div class="auth-brand">
      <img src="../components/_assets/logo.svg" alt="Lirion" />
    </div>

    <div class="card auth-card">

      <div class="card__header">
        <h1 class="card__title">Entrez votre email</h1>
        <p class="card__description">Connectez-vous avec l’adresse mail de votre compte Lirion.</p>
      </div>

      <div class="card__content">

        <div class="field">
          <label class="label" for="email">Email</label>
          <input class="input" type="email" id="email" placeholder="m@example.com" />
        </div>

        <button class="btn btn--default btn--full" onclick="location.href='password.html'">Suivant</button>

      </div>

    </div>

  </main>


</body>
</html>
