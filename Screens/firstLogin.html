<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Première connexion — Lirion</title>
  <link rel="stylesheet" href="../components/main.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="bg-muted">

  <header class="header">
    <div class="header__start">
      <img src="../components/_assets/logo.svg" alt="Lirion" class="header__logo" />
    </div>
  </header>

  <main class="page-centered">

    <div class="card auth-card">

      <div class="card__header">
        <h1 class="card__title">Bienvenue sur My Lirion</h1>
        <p class="card__description">Créez votre mot de passe associé à votre adresse email karine@lirion.app.</p>
      </div>

      <div class="card__content">

        <div class="field">
          <label class="label" for="ig-password-1">Créer un mot de passe</label>
          <div class="input-group input-group--icon-end">
            <input class="input" type="password" id="ig-password-1" placeholder="Enter password">
            <button type="button" class="input-group__icon input-group__icon--end input-group__icon--btn" id="toggle-password-1" aria-label="Toggle password visibility">
              <svg id="icon-eye-off-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              <svg id="icon-eye-1" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <p class="hint">Le mot de passe doit contenir au moins un chiffre, un caractère spécial et une majuscule.</p>
        </div>

        <div class="field">
          <label class="label" for="ig-password-2">Confirmer le mot de passe</label>
          <div class="input-group input-group--icon-end">
            <input class="input" type="password" id="ig-password-2" placeholder="Enter password">
            <button type="button" class="input-group__icon input-group__icon--end input-group__icon--btn" id="toggle-password-2" aria-label="Toggle password visibility">
              <svg id="icon-eye-off-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              <svg id="icon-eye-2" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <p class="hint">Les mots de passes doivent être identiques.</p>
        </div>

        <button class="btn btn--default btn--full" onclick="location.href='dashboard.html'">Créer un mot de passe</button>

      </div>

    </div>

  </main>

  <script>
    function initToggle(inputId, toggleId, eyeOffId, eyeId) {
      const toggle = document.getElementById(toggleId);
      const input  = document.getElementById(inputId);
      const eyeOff = document.getElementById(eyeOffId);
      const eye    = document.getElementById(eyeId);
      toggle.addEventListener('click', () => {
        const show = input.type === 'password';
        input.type           = show ? 'text' : 'password';
        eyeOff.style.display = show ? 'none' : '';
        eye.style.display    = show ? '' : 'none';
      });
    }
    initToggle('ig-password-1', 'toggle-password-1', 'icon-eye-off-1', 'icon-eye-1');
    initToggle('ig-password-2', 'toggle-password-2', 'icon-eye-off-2', 'icon-eye-2');
  </script>

</body>
</html>
