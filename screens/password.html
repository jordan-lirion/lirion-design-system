<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mot de passe — Lirion</title>
  <link rel="stylesheet" href="../components/main.css" />
</head>
<body class="bg-muted">

  <header class="header">
    <div class="header__start">
      <img src="../components/_assets/logo.svg" alt="Lirion" class="header__logo" />
    </div>
  </header>

  <main class="page-centered">

    <div class="auth-stack">

      <a href="login.html" class="btn btn--ghost btn--sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Retour
      </a>

      <div class="card auth-card">

        <div class="card__header">
          <h1 class="card__title">Entrez votre mot de passe</h1>
          <p class="card__description">Connectez-vous avec votre mot de passe Lirion.</p>
        </div>

        <div class="card__content">

          <div class="field">
            <div class="input-group input-group--icon-end">
              <input class="input" type="password" id="ig-password" placeholder="Enter password">
              <button type="button" class="input-group__icon input-group__icon--end input-group__icon--btn" data-password-toggle aria-label="Toggle password visibility">
                <svg id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                <svg id="icon-eye" class="is-hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
          </div>

          <button class="btn btn--default btn--full" onclick="location.href='dashboard.html'">Connexion</button>

          <p class="auth-footer">
            <button class="btn btn--link" value="Mot de passe oublié ?" onclick="location.href='forgotPassword.html'">Mot de passe oublié ?</button>
          </p>

        </div>

      </div>

    </div>

  </main>

  <script src="../components/form/form.js" defer></script>

</body>
</html>
