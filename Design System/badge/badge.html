<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge — Design System</title>
  <link rel="stylesheet" href="../main.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">Design System <span>/ Badge</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section">
      <h2 class="preview-section__title">Variants</h2>
      <div class="row">
        <span class="badge badge--default">New</span>
        <span class="badge badge--secondary">Draft</span>
        <span class="badge badge--destructive">Error</span>
        <span class="badge badge--outline">v2.4.0</span>
        <span class="badge badge--success">Success</span>
        <span class="badge badge--warning">Warning</span>
      </div>
    </section>

    <section class="preview-section">
      <h2 class="preview-section__title">Usage examples</h2>
      <div class="row">
        <span class="badge badge--default">Published</span>
        <span class="badge badge--secondary">In progress</span>
        <span class="badge badge--secondary">Draft</span>
        <span class="badge badge--destructive">Deleted</span>
        <span class="badge badge--outline">Beta</span>
        <span class="badge badge--outline">v1.0.0</span>
        <span class="badge badge--success">Completed</span>
        <span class="badge badge--warning">Pending</span>
      </div>
    </section>

  </main>

</body>
</html>
