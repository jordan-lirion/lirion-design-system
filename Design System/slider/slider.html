<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slider — Design System</title>
  <link rel="stylesheet" href="../main.css" />
  <link rel="stylesheet" href="../form/form.css" />
</head>
<body>

  <header class="preview-header">
    <div class="preview-header__title">Design System <span>/ Slider</span></div>
    <a href="../index.html" style="font-size:0.875rem;color:var(--muted-foreground);text-decoration:none;">← Back</a>
  </header>

  <main class="preview-main">

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Interactive slider</h2>
      <div class="stack">
        <div class="field">
          <label class="label" for="volume">Volume — <span id="volume-value">50</span>%</label>
          <input type="range" class="slider" id="volume" min="0" max="100" value="50" />
        </div>
        <div class="field">
          <label class="label" for="brightness">Brightness — <span id="brightness-value">75</span>%</label>
          <input type="range" class="slider" id="brightness" min="0" max="100" value="75" />
        </div>
      </div>
    </section>

    <section class="preview-section preview-section--6">
      <h2 class="preview-section__title">Preset values</h2>
      <div class="stack">
        <div class="field">
          <label class="label">0%</label>
          <input type="range" class="slider" id="s0" min="0" max="100" value="0" />
        </div>
        <div class="field">
          <label class="label">33%</label>
          <input type="range" class="slider" id="s33" min="0" max="100" value="33" />
        </div>
        <div class="field">
          <label class="label">100%</label>
          <input type="range" class="slider" id="s100" min="0" max="100" value="100" />
        </div>
      </div>
    </section>

  </main>

  <script>
    function initSlider(id, valueId) {
      const slider = document.getElementById(id);
      const display = valueId ? document.getElementById(valueId) : null;
      const update = () => {
        slider.style.setProperty("--slider-progress", slider.value + "%");
        if (display) display.textContent = slider.value;
      };
      slider.addEventListener("input", update);
      update();
    }
    initSlider("volume", "volume-value");
    initSlider("brightness", "brightness-value");
    initSlider("s0");
    initSlider("s33");
    initSlider("s100");
  </script>

</body>
</html>
