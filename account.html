<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Louna Harrar — Lirion</title>
  <link rel="stylesheet" href="components/main.css" />
</head>
<body>

  <!-- ======== HEADER ======== -->
  <header class="header">
    <div class="header__start">
      <a href="dashboard.html"><img src="assets/logo.svg" alt="Lirion" class="header__logo" /></a>
    </div>
    <div class="header__end">
      <a href="account.html" class="btn btn--outline btn--sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Mon compte
      </a>
    </div>
  </header>

  <!-- ======== PAGE ======== -->
  <div class="page-app">

    <div class="page-app__content">

      <!-- Back + Patient card -->
      <div class="page-app__section--muted page-app__section--pt-md">
        <a href="dashboard.html" class="btn btn--ghost btn--sm mb-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          Retour
        </a>
        <div class="card">
          <div class="section-row">
            <div class="flex-fill">
              <div class="stack stack--sm">
                <h1>Karine Eskinazi</h1>
                <div class="row row--sm">
                  <span class="text-muted">karine@lirion.app</span>
                </div>
              </div>
            </div>
            <div class="dropdown" data-dropdown="">
              <button class="btn btn--ghost btn--icon" data-dropdown-trigger="" aria-haspopup="menu" aria-expanded="false" aria-label="Options du patient">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              </button>
              <div class="dropdown__menu dropdown__menu--end" role="menu">
                <button class="dropdown__item" role="menuitem">Modifier</button>
                <hr class="dropdown__separator">
                <button class="dropdown__item dropdown__item--destructive" role="menuitem">Se déconnecter</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="page-app__section--muted page-app__section--pt-md">
        <div class="card">
          <h3>Sécurité</h3>
          <div class="section-row">
            <a href="#" class="item">
              <div class="item__media">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock-icon lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <div class="item__content">
                <div class="item__title">Modifier mon mot de passe</div>
              </div>
              <div class="item__actions">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
              </div>
            </a>
          </div>
        </div>
      </div>

    </div><!-- /.page-app__content -->
  </div><!-- /.page-app -->


  <!-- ======== SCRIPTS ======== -->
  <script src="components/dropdown/dropdown.js" defer></script>

</body>
</html>
