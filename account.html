<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Louna Harrar — Lirion</title>
  <link rel="stylesheet" href="components/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- ======== HEADER ======== -->
  <header class="header">
    <div class="header__start">
      <a href="dashboard.html"><img src="assets/logo.svg" alt="Lirion" class="header__logo" /></a>
    </div>
    <div class="header__end">
      <a href="account.html" class="btn btn--outline btn--sm">
        <i data-lucide="user"></i>
        Mon compte
      </a>
    </div>
  </header>

  <!-- ======== PAGE ======== -->
  <div class="page-app">

    <div class="page-app__content">

      <!-- Back + Patient card -->
      <div class="page-app__section--muted page-app__section--pt-md">
        <a href="dashboard.html" class="btn btn--ghost btn--sm mb-sm">
          <i data-lucide="arrow-left"></i>
          Retour
        </a>
        <div class="card">
          <div class="section-row">
            <div class="flex-fill">
              <div class="stack stack--sm">
                <h1>Karine Eskinazi</h1>
                <div class="row row--sm">
                  <span class="text-muted">karine@lirion.app</span>
                </div>
              </div>
            </div>
            <div class="dropdown" data-dropdown="">
              <button class="btn btn--ghost btn--icon" data-dropdown-trigger="" aria-haspopup="menu" aria-expanded="false" aria-label="Options du patient">
                <i data-lucide="ellipsis-vertical"></i>
              </button>
              <div class="dropdown__menu dropdown__menu--end" role="menu">
                <button class="dropdown__item" role="menuitem">Modifier</button>
                <hr class="dropdown__separator">
                <button class="dropdown__item dropdown__item--destructive" role="menuitem">Se déconnecter</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="page-app__section--muted page-app__section--pt-md">
        <div class="card">
          <h3>Sécurité</h3>
          <div class="section-row">
            <a href="#" class="item">
              <div class="item__media">
                <i data-lucide="lock"></i>
              </div>
              <div class="item__content">
                <div class="item__title">Modifier mon mot de passe</div>
              </div>
              <div class="item__actions">
                <i data-lucide="chevron-right"></i>
              </div>
            </a>
          </div>
        </div>
      </div>

    </div><!-- /.page-app__content -->
  </div><!-- /.page-app -->


  <!-- ======== SCRIPTS ======== -->
  <script src="components/dropdown/dropdown.js" defer></script>
  <script>lucide.createIcons();</script>

</body>
</html>
